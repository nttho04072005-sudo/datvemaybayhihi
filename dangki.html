<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo Tài Khoản - Hệ Thống Đặt Vé</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Giữ nguyên CSS dùng chung như trang Đăng Nhập cho đồng bộ */
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; box-sizing: border-box;}
        .auth-card { background: #ffffff; width: 100%; max-width: 420px; padding: 40px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.08); box-sizing: border-box; }
        .auth-header { text-align: center; margin-bottom: 30px; }
        .auth-header h2 { margin: 0; font-size: 28px; color: #1a1f36; font-weight: 800; letter-spacing: -0.5px; }
        .auth-header p { margin: 8px 0 0; color: #697386; font-size: 14px; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 13px; font-weight: 600; color: #3c4257; margin-bottom: 8px; }
        .input-wrapper { position: relative; display: flex; align-items: center; }
        .input-wrapper i.left-icon { position: absolute; left: 16px; color: #a3acb9; font-size: 16px; }
        .input-wrapper input { width: 100%; padding: 14px 45px; border: 1.5px solid #e2e8f0; border-radius: 12px; font-size: 15px; color: #1a1f36; background: #f8fafc; transition: all 0.3s ease; box-sizing: border-box; }
        .input-wrapper input:focus { border-color: #0068ff; background: #ffffff; outline: none; box-shadow: 0 0 0 4px rgba(0, 104, 255, 0.1); }
        .input-wrapper i.toggle-password { position: absolute; right: 16px; color: #a3acb9; cursor: pointer; transition: 0.2s; }
        .input-wrapper i.toggle-password:hover { color: #3c4257; }
        .mock-captcha { display: flex; align-items: center; justify-content: space-between; background: #fcfcfd; border: 1px solid #e2e8f0; padding: 12px 16px; border-radius: 12px; margin-bottom: 25px; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02); }
        .mock-captcha .left { display: flex; align-items: center; gap: 12px; font-size: 15px; color: #3c4257; font-weight: 600; }
        .mock-captcha .check { color: #10b981; font-size: 24px; }
        .mock-captcha .right { text-align: right; font-size: 10px; color: #8792a2; }
        .mock-captcha .right i { color: #f59e0b; font-size: 16px; margin-bottom: 2px; display: block; }
        .btn-submit { width: 100%; background: linear-gradient(135deg, #0068ff 0%, #0056d6 100%); color: white; border: none; padding: 15px; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0, 104, 255, 0.3); }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0, 104, 255, 0.4); }
        .switch-page { text-align: center; margin-top: 25px; font-size: 14px; color: #697386; }
        .switch-page a { color: #0068ff; text-decoration: none; font-weight: 700; transition: 0.2s; }
        .switch-page a:hover { text-decoration: underline; }
        
        /* Chú thích điều kiện mật khẩu */
        .password-hint { font-size: 12px; color: #8792a2; margin-top: 5px; display: block; }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="auth-header">
            <h2>Tạo tài khoản</h2>
            <p>Đăng ký miễn phí và bắt đầu ngay hôm nay</p>
        </div>

        <div class="input-group">
            <label>Họ và Tên</label>
            <div class="input-wrapper">
                <i class="fa-regular fa-id-card left-icon"></i>
                <input type="text" id="reg-fullname" placeholder="Nhập họ và tên của bạn" required>
            </div>
        </div>

        <div class="input-group">
            <label>Tên tài khoản</label>
            <div class="input-wrapper">
                <i class="fa-regular fa-user left-icon"></i>
                <input type="text" id="reg-username" placeholder="Nhập tên tài khoản (> 6 kí tự)" required>
            </div>
        </div>

        <div class="input-group">
            <label>Mật khẩu</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-lock left-icon"></i>
                <input type="password" id="reg-password" placeholder="Nhập mật khẩu của bạn" required>
                <i class="fa-regular fa-eye toggle-password" onclick="togglePassword('reg-password', this)"></i>
            </div>
            <span class="password-hint">* Trên 8 ký tự, viết hoa chữ đầu, có ký tự đặc biệt</span>
        </div>

        <div class="mock-captcha">
            <div class="left">
                <i class="fa-solid fa-circle-check check"></i>
                <span>Thành công!</span>
            </div>
            <div class="right">
                <i class="fa-brands fa-cloudflare"></i>
                Quyền riêng tư<br>Giúp đỡ
            </div>
        </div>

        <button class="btn-submit" onclick="register()">Đăng ký ngay</button>

        <div class="switch-page">
            Đã có tài khoản? <a href="dangnhap.html">Đăng nhập</a>
        </div>
    </div>

    <script>
        const API_URL = 'https://b86xzs1p-7211.asse.devtunnels.ms/api';

        function togglePassword(inputId, icon) {
            const input = document.getElementById(inputId);
            if (input.type === "password") {
                input.type = "text";
                icon.classList.replace("fa-eye", "fa-eye-slash");
            } else {
                input.type = "password";
                icon.classList.replace("fa-eye-slash", "fa-eye");
            }
        }

        async function register() {
            const fullname = document.getElementById('reg-fullname').value.trim();
            const username = document.getElementById('reg-username').value.trim();
            const password = document.getElementById('reg-password').value;

            if (!fullname || !username || !password) {
                alert("Vui lòng điền đầy đủ thông tin!"); return;
            }

            // --- ĐIỀU KIỆN RÀNG BUỘC THEO YÊU CẦU ---
            if (username.length <= 6) {
                alert("❌ Tên tài khoản phải dài TRÊN 6 ký tự!"); return;
            }

            const hasSpecialChar = /[!@#$%^&*(),.?":{}|<>_]/.test(password);
            const isFirstLetterUpper = /^[A-Z]/.test(password);

            if (password.length <= 8) {
                alert("❌ Mật khẩu phải dài TRÊN 8 ký tự!"); return;
            }
            if (!isFirstLetterUpper) {
                alert("❌ Chữ cái đầu tiên của mật khẩu phải VIẾT HOA!"); return;
            }
            if (!hasSpecialChar) {
                alert("❌ Mật khẩu bắt buộc phải có ít nhất 1 KÝ TỰ ĐẶC BIỆT (!@#$...)!"); return;
            }

            try {
                let res = await fetch(`${API_URL}/flights/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ Username: username, Password: password, FullName: fullname })
                });
                let data = await res.json();
                
                if (res.ok) {
                    alert("🎉 " + data.message + " Trình duyệt sẽ chuyển hướng tới trang Đăng nhập.");
                    window.location.href = "dangnhap.html"; // Tự động sang trang đăng nhập
                } else {
                    alert("❌ " + data.message);
                }
            } catch (error) { 
                alert("Lỗi kết nối mạng!"); 
            }
        }
    </script>

</body>
</html>
